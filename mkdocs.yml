site_name: Payflip Docs
site_description: A unified balance layer for using money across chains, apps, and currencies.
site_url: https://docs.payflip.xyz
site_author: Payflip Labs

repo_name: payflip-labs/documentation
repo_url: https://github.com/payflip-labs/documentation
edit_uri: edit/main/docs/

strict: true

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate   # required, but we override it fully
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  extra_css:
    - stylesheets/extra.css
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

nav:
  - Home: index.md
  - What is Payflip?: what-is-payflip.md
  - The Problem: the-problem.md
  - Why Payflip: why-payflip.md
  - Use Cases: use-cases.md
  - FAQ: faq.md
  - Links: links.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/payflipxyz
    - icon: fontawesome/brands/discord
      link: https://discord.gg/2SBfM9kqrk
    - icon: fontawesome/brands/github
      link: https://github.com/payflip-labs
  generator: false

copyright: Copyright &copy; Payflip Labs
